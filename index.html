<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06080a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Diggy World" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Diggy World</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #06080a;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #8aa39b;
        font-size: 13px;
        letter-spacing: 0.08em;
        pointer-events: none;
        transition: opacity 0.5s ease;
        z-index: 10;
      }
      #boot .title {
        font-size: 22px;
        color: #c8d8d0;
        margin-bottom: 14px;
        letter-spacing: 0.35em;
      }
      #boot .bar {
        width: 260px;
        height: 2px;
        background: #1a2420;
        margin-top: 16px;
        position: relative;
        overflow: hidden;
      }
      #boot .bar > div {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        background: #5fae8f;
        transition: width 0.2s ease;
        overflow: hidden;
      }
      #boot .bar > div::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
        animation: boot-shimmer 1.6s ease-in-out infinite;
      }
      @keyframes boot-shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .bar > div::after { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">
      <div class="title">DIGGY WORLD</div>
      <div id="boot-msg">initializing</div>
      <div class="bar"><div id="boot-bar"></div></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
